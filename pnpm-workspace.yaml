# A pnpm 10+ biztonsági okból csak külön engedéllyel futtatja a csomagok
# telepítő szkriptjeit. Az alábbi három natív kódot fordít telepítéskor:
#   sharp  – képfeldolgozás (a Payload képméretezéséhez kötelező)
#   esbuild, unrs-resolver – fejlesztői eszközök belső fordítói

# pnpm 11+ ezt a formátumot olvassa:
allowBuilds:
  sharp: true
  esbuild: true
  unrs-resolver: true

# pnpm 10.0–10.8 még ezt a (v11-ben megszűnt) kulcsot használja:
onlyBuiltDependencies:
  - sharp
  - esbuild
  - unrs-resolver
